[mgr]
show_hidden = false
sort_by = "natural"
sort_sensitive = false
linemode = "size"
show_symlink = true

[preview]
tab_size = 2
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Open with Neovim" },
  { run = 'vim "$@"', block = true, desc = "Open with Vim" },
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal" },
]

open = [
  { run = 'xdg-open "$1"', desc = "Open" },
]

play = [
  { run = 'mpv --force-window "$@"', orphan = true, desc = "Play with MPV" },
  { run = 'vlc "$@"', orphan = true, desc = "Play with VLC" },
  { run = '''mediainfo "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show media info" },
]

extract = [
	{ run = 'ouch d -y "$@"', desc = "Extract here with ouch" },
]

[open]
prepend_rules = [

# Media
  { mime = "video/*", use = ["play", "reveal"] },
  { mime = "audio/*", use = ["play", "reveal"] },

# Images
  { mime = "image/*", use = ["open", "reveal"] },

# Directories
  { mime = "inode/directory", use = ["edit", "open", "reveal"] },

# Text / config
  { mime = "text/*", use = ["edit", "reveal"] },
  { url = "*.toml", use = ["edit", "reveal"] },
  { url = "*.json", use = ["edit", "reveal"] },
  { url = "*.yaml", use = ["edit", "reveal"] },
  { url = "*.yml",  use = ["edit", "reveal"] },

# Archive
  {mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", use = ["extract", "open", "reveal"]},

# Fallback
  { url = "*", use = ["open", "edit", "reveal"] },
]

[plugin]
prepend_preloaders = [
  { mime = "{audio,video,image}/*", run = "mediainfo" },
]

prepend_previewers = [
  { mime = "{audio,video,image}/*", run = "mediainfo" },
  { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run = "ouch" }
]

[tasks]
image_alloc = 1073741824

[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
group = "git"
