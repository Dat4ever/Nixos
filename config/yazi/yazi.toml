[manager]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
linemode = "size"
show_symlink = true

[preview]
tab_size = 2
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]

[plugin]
  prepend_preloaders = [
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/{subrip,postscript,illustrator,dvb.ait,vnd.adobe.illustrator,eps,x-eps}", run = "mediainfo" },
    { url = "*.{ai,eps,ait}", run = "mediainfo" }
  ]

  prepend_previewers = [
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/{subrip,postscript,illustrator,dvb.ait,vnd.adobe.illustrator,eps,x-eps}", run = "mediainfo" },
    { url = "*.{ai,eps,ait}", run = "mediainfo" }
  ]

[tasks]
  image_alloc      = 1073741824

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"
