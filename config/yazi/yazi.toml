[manager]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
linemode = "size"
show_symlink = true

[preview]
tab_size = 2
max_width = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]

[plugin]
prepend_previewers = [
    { mime = "audio/*",   run = "exifaudio"}
]

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*/"
run   = "git"
group = "git"
